<section class="pantalla activa">
  <div class="seccion-inicio-sesion">
    <h1>Inicio de Sesión</h1>

    @if (mensajeExito()) {
      <p class="lc-msg lc-msg--ok">{{ mensajeExito() }}</p>
    }

    <form class="formulario-inicio-sesion" (ngSubmit)="validarLogin($event)">
      <div class="formulario-inicio-sesion-elemento">
        <label for="email">Correo Institucional*</label>
        <input
          type="email"
          id="email"
          name="correoInstitucional"
          class="ss-input"
          [(ngModel)]="correoInstitucional"
          placeholder="Ej: u20201234@upc.edu.pe"
          required
        />
      </div>

      <div class="formulario-inicio-sesion-elemento">
        <label for="password">Contraseña*</label>
        <input
          type="password"
          id="password"
          name="password"
          class="ss-input"
          [(ngModel)]="password"
          placeholder="Introduce tu contraseña"
          required
        />
      </div>

      @if (error()) {
        <p class="lc-msg lc-msg--err">{{ error() }}</p>
      }

      <div class="formulario-inicio-sesion-elemento">
        <button type="submit" class="ss-btn-primary" [disabled]="cargando()">
          {{ cargando() ? 'Ingresando...' : 'Iniciar Sesión' }}
        </button>
      </div>
    </form>

    <label>¿No tienes cuenta?
      <a routerLink="/registrar">Regístrate</a>
    </label>
  </div>
</section>

<footer>
  <div class="seccion-footer">
    <p>2025 SkillSwap. Todos los derechos reservados.</p>
  </div>
</footer>

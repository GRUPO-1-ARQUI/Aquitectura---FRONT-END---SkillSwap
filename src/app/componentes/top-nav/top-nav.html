<nav class="ss-nav">
  <!-- LEFT: brand -->
  <a routerLink="/home" class="ss-nav__brand">
    <img src="/images/SkillSwap_logo.png" alt="SkillSwap" class="ss-nav__logo" />
    <span class="ss-nav__brand-name">SkillSwap</span>
  </a>

  <!-- RIGHT: links + actions -->
  <div class="ss-nav__right">
    @for (link of links; track link.path) {
      <a [routerLink]="link.path" routerLinkActive="ss-nav__link--active" class="ss-nav__link">{{ link.label }}</a>
    }

    <!-- Search icon -->
    <button class="ss-nav__icon-btn" aria-label="Buscar">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>

    <!-- Bell icon → /app/notificaciones (con badge de no leídas) -->
    <div class="ss-nav__bell-wrap">
      <a routerLink="/app/notificaciones" class="ss-nav__icon-btn" aria-label="Notificaciones">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </a>
      @if (cantidadNoLeidas() > 0) {
        <span class="ss-nav__badge" aria-label="{{ cantidadNoLeidas() }} notificaciones no leídas">
          {{ cantidadNoLeidas() > 99 ? '99+' : cantidadNoLeidas() }}
        </span>
      }
    </div>

    <!-- User info -->
    @if (sesion.isLoggedIn()) {
      <span class="ss-nav__username">{{ sesion.getNombre() }}</span>

      <div class="ss-nav__avatar" [attr.data-initial]="sesion.getNombre().charAt(0).toUpperCase()"></div>

      <button class="ss-btn-outline ss-nav__logout" (click)="logout()">
        Cerrar sesión
      </button>
    }
  </div>
</nav>
